<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病理学 穴埋め暗記シート</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; text-align: center; color: #2c3e50; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .back-btn { background: #fff; border: 1px solid #ccd1d9; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; display: inline-block; margin-bottom: 20px; color: #555; text-decoration: none; }
        .back-btn:hover { background: #f8f9fa; }
        h2 { color: #2c3e50; font-size: 1.8rem; margin-bottom: 20px; font-weight: bold; }
        .status-box { background: #f8f9fa; border: 1px solid #ccd1d9; padding: 12px; border-radius: 12px; margin-bottom: 25px; font-size: 0.9rem; text-align: left; line-height: 1.4; }
        .setting-item { margin-bottom: 25px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2c3e50; font-size: 0.95rem; }
        select { width: 100%; padding: 14px; font-size: 1rem; border-radius: 12px; border: 1px solid #ccd1d9; background-color: #fff; font-weight: 600; color: #2c3e50; outline: none; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .toggle-btn { flex: 1; padding: 12px; border: 1px solid #ccd1d9; background: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; transition: all 0.15s; color: #2c3e50; text-align: center; }
        .toggle-btn.active { background: #ffe9e9; color: #e74c3c; border-color: #e74c3c; }
        .all-btn { width: 100%; padding: 12px; border: 1px solid #ccd1d9; background: #f8f9fa; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 15px; color: #555; }
        .start-btn { width: 100%; padding: 16px; background-color: #3498db; color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2); }
        .start-btn:hover { background-color: #2980b9; }
        
        /* クイズ画面 */
        .quiz-view { display: none; }
        .quiz-card { background: #fff; border: 1px solid #ccd1d9; border-radius: 24px; padding: 30px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #95a5a6; font-weight: bold; margin-bottom: 25px; border-bottom: 1px solid #f1f2f6; padding-bottom: 15px; }
        
        .card-body { 
            font-size: 1.25rem; 
            font-weight: bold; 
            line-height: 2.3; 
            color: #2c3e50; 
            margin-bottom: 10px; 
            word-break: break-word; 
        }
        
        /* 穴埋めシート（濃いネイビーのブロック） */
        .blank {
            display: inline-block;
            background-color: #2c3e50; 
            border-radius: 6px;
            padding: 0 10px;
            margin: 0 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;         
            vertical-align: middle;
            line-height: 1.4;
            min-width: 3em;          
            text-align: center;
            border-bottom: 2px solid #1a252f;
        }
        /* 中のテキスト（隠し状態の時は見えない） */
        .blank .blank-text {
            visibility: hidden;
            color: #e74c3c;
            font-weight: bold;
        }
        /* タップされた時・一斉表示された時 */
        .blank.open {
            background-color: #ffe9e9; 
            border-bottom: 2px solid #e74c3c;
            cursor: default;
        }
        .blank.open .blank-text {
            visibility: visible;
        }

        .action-area { display: flex; gap: 12px; margin-top: 20px; }
        .action-area .all-btn { flex: 1; margin: 0; padding: 14px; font-size: 0.95rem; }
        .next-btn { flex: 1; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; cursor: pointer; box-sizing: border-box; }
        .next-btn:hover { background-color: #2980b9; }
        .result-view { display: none; }
    </style>
</head>
<body>

    <div id="nav-zone">
        <button class="back-btn" id="back-btn" style="display: none; margin-right: 8px;" onclick="backToSetup()">➔ 設定に戻る</button>
        <button class="back-btn" onclick="window.location.href='https://kaoman0079-ops.github.io/Meridian-Node/'">🏠 Meridian-Nodeへ戻る</button>
    </div>

    <div id="setup-view" class="container">
        <h2>穴埋め演習 設定</h2>

        <div id="db-status" class="status-box" style="color: #7f8c8d;">
            ⏳ データを準備中...
        </div>

        <div class="setting-item">
            <label>出題カテゴリ</label>
            <div class="btn-group">
                <button class="toggle-btn ch-btn active" data-ch="8">8章</button>
                <button class="toggle-btn ch-btn" data-ch="9">9章</button>
                <button class="toggle-btn ch-btn" data-ch="10">10章</button>
            </div>
            <button class="all-btn" onclick="selectAllChapters()">全範囲を選択</button>
        </div>

        <div class="setting-item">
            <label>出題順</label>
            <div class="btn-group">
                <button class="toggle-btn order-btn active" data-order="sequence">順番通り</button>
                <button class="toggle-btn order-btn" data-order="random">ランダム</button>
            </div>
        </div>

        <div class="setting-item">
            <label>出題数</label>
            <select id="quiz-count">
                <option value="5">5問</option>
                <option value="10" selected>10問</option>
                <option value="20">20問</option>
                <option value="all">全問</option>
            </select>
        </div>

        <button class="start-btn" onclick="startQuiz()">演習を開始する 🚀</button>
    </div>

    <div id="quiz-view" class="container quiz-view">
        <div class="quiz-card">
            <div class="card-header">
                <span id="card-count">カード 1 / 10</span>
                <span id="card-meta">病理学</span>
            </div>
            <div class="card-body" id="question-text">問題文読み込み中...</div>
        </div>
        
        <div class="action-area">
            <button class="all-btn" onclick="revealAllBlanks()">答えを一斉表示 👁️</button>
            <button class="next-btn" id="next-btn" onclick="nextCard()">次のカード ➔</button>
        </div>
    </div>

    <div id="result-view" class="container result-view">
        <h2>演習終了！</h2>
        <p style="font-size: 1.1rem; margin-bottom: 30px;">お疲れ様でした。すべてのカードを確認しました！</p>
        <button class="start-btn" onclick="backToSetup()" style="background-color: #3498db;">設定に戻る 🔄</button>
    </div>

    <script>
        let database = [];
        let quizQueue = [];
        let currentIndex = 0;

        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.ch-btn').forEach(btn => {
                btn.addEventListener('click', () => btn.classList.toggle('active'));
            });
            document.querySelectorAll('.order-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.order-btn').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                });
            });
            fetchCSV();
        });

        function selectAllChapters() {
            document.querySelectorAll('.ch-btn').forEach(btn => btn.classList.add('active'));
        }

        function fetchCSV() {
            const csvPath = './anadata.csv';
            
            fetch(csvPath)
                .then(res => {
                    if (!res.ok) throw new Error("ファイル取得失敗: " + res.status);
                    return res.text();
                })
                .then(text => {
                    parseCSV(text);
                })
                .catch(err => {
                    console.error("エラー:", err);
                    const statusEl = document.getElementById('db-status');
                    statusEl.innerHTML = `❌ <strong>データ読み込み失敗</strong><br>${err.message}<br><span style="font-size:0.8rem; color:#888;">※GitHubにプッシュしてWEB上で確認してください。</span>`;
                    statusEl.style.color = "#e74c3c";
                    statusEl.style.borderColor = "#e74c3c";
                });
        }

        function parseCSV(text) {
            text = text.replace(/^\uFEFF/, '');
            database = [];
            
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentField += '"';
                        i++; 
                    } else {
                        inQuotes = !inQuotes; 
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') {
                        i++; 
                    }
                    currentRow.push(currentField);
                    if (currentRow.some(field => field.trim() !== '')) {
                        rows.push(currentRow);
                    }
                    currentRow = [];
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            if (currentField !== '' || currentRow.length > 0) {
                currentRow.push(currentField);
                if (currentRow.some(field => field.trim() !== '')) {
                    rows.push(currentRow);
                }
            }

            for (let i = 1; i < rows.length; i++) {
                const parts = rows[i];
                if (parts.length < 3) continue;
                
                let chapter, no, question, answers;
                
                if (parts.length >= 4) {
                    chapter = parts[0].trim();
                    no = parts[1].trim();
                    question = parts[2].trim();
                    answers = parts[3].trim();
                } else {
                    chapter = parts[0].trim();
                    question = parts[1].trim();
                    answers = parts[2].trim();
                    no = i;
                }
                
                if (chapter && question && answers) {
                    database.push({
                        chapter: chapter,
                        question: question,
                        answers: answers,
                        no: no
                    });
                }
            }

            const statusEl = document.getElementById('db-status');
            if (database.length > 0) {
                statusEl.innerHTML = `✅ <strong>${database.length}件</strong> のデータ読み込み完了！`;
                statusEl.style.color = "#27ae60";
                statusEl.style.borderColor = "#27ae60";
            } else {
                statusEl.innerHTML = `⚠️ データが0件です`;
                statusEl.style.color = "#e67e22";
                statusEl.style.borderColor = "#e67e22";
            }
        }

        function formatMedBlankStyle(question, answers) {
            let html = question;
            const answerArray = answers.split(/[,、\/\|;\s\n]+/).filter(a => a.trim() !== '');
            
            const placeholderRegex = /[{\(\[（｛〔【［〈]\s*[?？]\s*[\}\)\]）｝〕】］〉]/g;
            let answerIndex = 0;
            let matchCount = 0;

            html = html.replace(placeholderRegex, (match) => {
                const ans = answerArray[answerIndex] ? answerArray[answerIndex].trim() : match;
                answerIndex++;
                matchCount++;
                return `<span class="blank" onclick="this.classList.toggle('open')"><span class="blank-text">${ans}</span></span>`;
            });

            if (matchCount > 0) {
                return html;
            }

            const hasParentheses = /[（\(][^）\)]+[）\)]/.test(html);
            if (hasParentheses) {
                return html.replace(/[（\(]([^）\)]+)[）\)]/g, '<span class="blank" onclick="this.classList.toggle(\'open\')"><span class="blank-text">$1</span></span>');
            }

            if (answers && html.includes(answers)) {
                const escapedAnswers = answers.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                return html.replace(new RegExp(escapedAnswers, 'g'), `<span class="blank" onclick="this.classList.toggle('open')"><span class="blank-text">${answers}</span></span>`);
            }

            return html + ` <span style="color: #95a5a6; font-size: 1rem; font-weight: normal; margin-left: 6px;">➔</span> <span class="blank" onclick="this.classList.toggle('open')"><span class="blank-text">${answers}</span></span>`;
        }

        function startQuiz() {
            if (database.length === 0) {
                alert('データが読み込まれていません');
                return;
            }

            const activeChapters = [];
            document.querySelectorAll('.ch-btn.active').forEach(btn => {
                activeChapters.push(btn.getAttribute('data-ch'));
            });

            if (activeChapters.length === 0) {
                alert('章を選択してください');
                return;
            }

            let filtered = database.filter(item => activeChapters.includes(item.chapter));

            if (filtered.length === 0) {
                alert('選択された章に問題がありません');
                return;
            }

            const orderActive = document.querySelector('.order-btn.active');
            const orderStyle = orderActive ? orderActive.getAttribute('data-order') : 'sequence';
            
            if (orderStyle === 'random') {
                filtered.sort(() => Math.random() - 0.5);
            } else {
                filtered.sort((a, b) => (parseInt(a.chapter) - parseInt(b.chapter)) || (parseInt(a.no) - parseInt(b.no)) || (a.no > b.no ? 1 : -1));
            }

            const countVal = document.getElementById('quiz-count').value;
            let limit = countVal === 'all' ? filtered.length : Math.min(parseInt(countVal), filtered.length);
            
            quizQueue = filtered.slice(0, limit);
            currentIndex = 0;

            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'inline-block';
            
            showCard();
        }

        function showCard() {
            if (currentIndex >= quizQueue.length) return;
            
            const item = quizQueue[currentIndex];
            
            document.getElementById('card-count').innerText = `カード ${currentIndex + 1} / ${quizQueue.length}`;
            document.getElementById('card-meta').innerText = `病理学 ➔ ${item.chapter}章 No.${item.no}`;
            document.getElementById('question-text').innerHTML = formatMedBlankStyle(item.question, item.answers);
        }

        function revealAllBlanks() {
            document.querySelectorAll('.blank').forEach(el => el.classList.add('open'));
        }

        function nextCard() {
            currentIndex++;
            if (currentIndex < quizQueue.length) {
                showCard();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
        }

        function backToSetup() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('setup-view').style.display = 'block';
        }
    </script>
</body>
</html>
