<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathoForge - 穴埋め暗記シート</title>
    <style>
        /* 全体ベーススタイル */
        body { font-family: -apple-system, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; text-align: center; color: #2c3e50; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* 戻るボタン */
        .back-btn { background: #fff; border: 1px solid #ccd1d9; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; display: inline-block; margin-bottom: 20px; color: #555; font-weight: bold; text-decoration: none; }
        .back-btn:hover { background: #f8f9fa; }

        h2 { color: #2c3e50; font-size: 1.8rem; margin-bottom: 20px; font-weight: bold; }
        
        /* 【重要】データ読み込み状態メーター */
        .status-box { background: #f8f9fa; border: 1px solid #ccd1d9; padding: 12px; border-radius: 12px; margin-bottom: 25px; font-size: 0.9rem; text-align: left; line-height: 1.4; }

        /* 設定画面用スタイル */
        .setting-item { margin-bottom: 25px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2c3e50; font-size: 0.95rem; }
        select { width: 100%; padding: 14px; font-size: 1rem; border-radius: 12px; border: 1px solid #ccd1d9; background-color: #fff; font-weight: 600; color: #2c3e50; outline: none; box-sizing: border-box; }
        
        /* グループボタン（章・出題順用） */
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .toggle-btn { flex: 1; padding: 12px; border: 1px solid #ccd1d9; background: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; transition: all 0.15s; color: #2c3e50; text-align: center; font-size: 0.95rem; }
        .toggle-btn.active { background: #ffe9e9; color: #e74c3c; border-color: #e74c3c; }
        
        .all-btn { width: 100%; padding: 12px; border: 1px solid #ccd1d9; background: #f8f9fa; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 15px; color: #555; }
        .start-btn { width: 100%; padding: 16px; background-color: #e74c3c; color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background 0.2s; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3); }
        .start-btn:hover { background-color: #c0392b; }

        /* クイズ画面用スタイル */
        .quiz-view { display: none; }
        .quiz-card { background: #fff; border: 1px solid #ccd1d9; border-radius: 24px; padding: 30px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #95a5a6; font-weight: bold; margin-bottom: 25px; border-bottom: 1px solid #f1f2f6; padding-bottom: 12px; }
        .card-body { font-size: 1.25rem; font-weight: bold; line-height: 1.6; color: #2c3e50; margin-bottom: 30px; word-break: break-all; }
        
        /* 隠された正解エリア */
        .answer-zone { width: 100%; padding: 20px; background: #f8f9fa; border: 2px dashed #ccd1d9; border-radius: 14px; text-align: center; box-sizing: border-box; cursor: pointer; transition: all 0.2s; margin-bottom: 20px; }
        .answer-zone.hidden { color: #7f8c8d; font-weight: bold; background: #f1f2f6; font-size: 1.1rem; }
        .answer-zone.hidden:hover { background: #e4e7eb; border-color: #95a5a6; }
        .answer-zone.revealed { background: #fff5f5; border: 2px solid #e74c3c; color: #e74c3c; font-size: 1.6rem; font-weight: bold; cursor: default; }

        /* 解説ゾーン */
        .explanation-zone { display: none; background: #f8f9fa; border-left: 4px solid #3498db; padding: 15px; border-radius: 8px; text-align: left; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.5; }
        .next-btn { width: 100%; padding: 14px; background-color: #3498db; color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.2); }
        .next-btn:hover { background-color: #2980b9; }

        /* 終了画面 */
        .result-view { display: none; }
    </style>
</head>
<body>

    <div id="nav-zone">
        <button class="back-btn" id="back-btn" style="display: none;" onclick="backToSetup()">➔ 設定に戻る</button>
    </div>

    <div id="setup-view" class="container">
        <h2>穴埋め暗記シート 設定</h2>

        <div id="db-status" class="status-box" style="color: #7f8c8d;">
            ⏳ anadata.csv を読み込み中...
        </div>

        <div class="setting-item">
            <label>出題カテゴリ</label>
            <div class="btn-group">
                <button class="toggle-btn ch-btn active" data-ch="8">8章</button>
                <button class="toggle-btn ch-btn" data-ch="9">9章</button>
                <button class="toggle-btn ch-btn" data-ch="10">10章</button>
            </div>
            <button class="all-btn" onclick="selectAllChapters()">全範囲を選択</button>
        </div>

        <div class="setting-item">
            <label>出題順</label>
            <div class="btn-group">
                <button class="toggle-btn order-btn active" data-order="sequence">順番通り（No.順）</button>
                <button class="toggle-btn order-btn" data-order="random">ランダム</button>
            </div>
        </div>

        <div class="setting-item">
            <label>出題数</label>
            <select id="quiz-count">
                <option value="5">5問</option>
                <option value="10" selected>10問</option>
                <option value="20">20問</option>
                <option value="all">全問</option>
            </select>
        </div>

        <button class="start-btn" onclick="startQuiz()">暗記を開始 🚀</button>
    </div>

    <div id="quiz-view" class="container quiz-view">
        <div class="quiz-card">
            <div class="card-header">
                <span id="card-count">カード 1 / 10</span>
                <span id="card-meta">病理学 ➔ 8章</span>
            </div>
            <div class="card-body" id="question-text">問題文読み込み中...</div>
            
            <div id="answer-zone" class="answer-zone hidden">タップして正解を表示 🔍</div>
        </div>

        <div class="explanation-zone" id="explanation-zone">
            <strong>💡 解説:</strong> <span id="explanation-text"></span>
        </div>

        <button class="next-btn" id="next-btn" onclick="nextCard()">次のカード ➔</button>
    </div>

    <div id="result-view" class="container result-view">
        <h2>演習終了！</h2>
        <p style="font-size: 1.1rem; margin-bottom: 30px;">お疲れ様でした。すべてのカードを確認しました！</p>
        <button class="start-btn" onclick="backToSetup()" style="background-color: #3498db; box-shadow: 0 4px 12px rgba(52,152,219,0.3);">設定に戻る 🔄</button>
    </div>

    <script>
        let database = [];
        let quizQueue = [];
        let currentIndex = 0;

        window.addEventListener('DOMContentLoaded', () => {
            // 章ボタンの切り替え
            document.querySelectorAll('.ch-btn').forEach(btn => {
                btn.addEventListener('click', () => btn.classList.toggle('active'));
            });

            // 出題順ボタンの切り替え
            document.querySelectorAll('.order-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.order-btn').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                });
            });

            fetchCSV();
        });

        function selectAllChapters() {
            document.querySelectorAll('.ch-btn').forEach(btn => btn.classList.add('active'));
        }

        function fetchCSV() {
            fetch('anadata.csv')
                .then(res => {
                    if (!res.ok) throw new Error("ファイルが見つかりません。ファイル名が「anadata.csv」になっているか確認してください。");
                    return res.text();
                })
                .then(text => parseCSV(text))
                .catch(err => {
                    const statusEl = document.getElementById('db-status');
                    statusEl.innerHTML = `❌ <strong>データの読み込みに失敗しました</strong><br>` +
                                          `・原因①: HTMLと同じ場所に <code>anadata.csv</code> がない<br>` +
                                          `・原因②: ブラウザのセキュリティ制限（file:/// で直接開いている）<br>` +
                                          `<small style="color:#e74c3c; display:block; margin-top:5px;">※VSCodeのLive Server等を使うと解決します</small>`;
                    statusEl.style.color = "#e74c3c";
                    statusEl.style.borderColor = "#e74c3c";
                    console.error(err);
                });
        }

        function parseCSV(text) {
            // 【修正】BOM（U+FEFF）の除去を安全に外側で行う
            text = text.replace(/^\uFEFF/, '');

            const lines = [];
            let row = [];
            let curr = '';
            let inQuotes = false;

            for (let i = 0; i < text.length; i++) {
                let char = text[i];
                let next = text[i+1];

                if (char === '"') {
                    if (inQuotes && next === '"') { curr += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(curr.trim()); curr = '';
                } else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (char === '\r' && next === '\n') i++;
                    row.push(curr.trim());
                    if (row.some(c => c !== '')) lines.push(row);
                    row = []; curr = '';
                } else {
                    curr += char;
                }
            }
            if (curr || row.length > 0) { row.push(curr.trim()); if (row.some(c => c !== '')) lines.push(row); }

            database = [];
            let startIdx = 0;
            if (lines.length > 0 && lines[0].some(c => c.includes('章') || c.includes('ch') || c.includes('No') || c.includes('問題'))) {
                startIdx = 1; 
            }

            for (let i = startIdx; i < lines.length; i++) {
                const cols = lines[i];
                if (cols.length < 3) continue;

                // 安全に章の数字を抽出
                let chapterStr = cols[0] || "";
                let matchCh = chapterStr.match(/\d+/);
                let chapter = matchCh ? matchCh[0] : chapterStr.replace(/[^0-9]/g, '').trim();

                // 安全にNoの数字を抽出
                let noStr = cols[1] || "";
                let matchNo = noStr.match(/\d+/);
                let no = matchNo ? parseInt(matchNo[0]) : (i + 1);

                let question = cols[2] ? cols[2].trim() : "";
                let answer = cols[3] ? cols[3].trim() : "";
                let explanation = cols[4] ? cols[4].trim() : "解説はありません。";

                if (question && answer) {
                    database.push({ chapter: chapter, no: no, question: question, answer: answer, explanation: explanation });
                }
            }

            // 【新設】画面上部のメーターを「成功表示」に更新
            const statusEl = document.getElementById('db-status');
            if (database.length > 0) {
                statusEl.innerHTML = `✅ <strong>anadata.csv</strong> から <strong>${database.length}件</strong> のデータを正常に読み込みました！`;
                statusEl.style.color = "#27ae60";
                statusEl.style.borderColor = "#27ae60";
            } else {
                statusEl.innerHTML = `⚠️ ファイルは開けましたが、有効なデータが0件です。列の並び（章, No, 問題, 正解）を確認してください。`;
                statusEl.style.color = "#e67e22";
                statusEl.style.borderColor = "#e67e22";
            }
        }

        function startQuiz() {
            if (database.length === 0) {
                alert('CSVデータが読み込まれていません。画面上部の赤いエラーメッセージを確認してください。');
                return;
            }

            const activeChapters = [];
            document.querySelectorAll('.ch-btn.active').forEach(btn => {
                activeChapters.push(btn.getAttribute('data-ch'));
            });

            if (activeChapters.length === 0) {
                alert('出題カテゴリ（章）を1つ以上選択してください。');
                return;
            }

            // 文字列と数値の両方の可能性を考慮してフィルタリング
            let filtered = database.filter(item => {
                return activeChapters.includes(item.chapter) || 
                       activeChapters.includes(parseInt(item.chapter).toString());
            });

            if (filtered.length === 0) {
                alert('選択された章（' + activeChapters.join(', ') + '章）の問題が見つかりませんでした。CSVの1列目に正しい章番号が入っているか確認してください。');
                return;
            }

            // 【修正】選んだ出題順（順番通り or ランダム）を安全に実行
            const orderActive = document.querySelector('.order-btn.active');
            const orderStyle = orderActive ? orderActive.getAttribute('data-order') : 'sequence';
            
            if (orderStyle === 'random') {
                filtered.sort(() => Math.random() - 0.5);
            } else {
                // 順番通り（NaNエラーを絶対に起こさない安全な数値ソート）
                filtered.sort((a, b) => {
                    const chA = parseInt(a.chapter) || 0;
                    const chB = parseInt(b.chapter) || 0;
                    if (chA !== chB) return chA - chB;
                    
                    const noA = parseInt(a.no) || 0;
                    const noB = parseInt(b.no) || 0;
                    return noA - noB;
                });
            }

            const countVal = document.getElementById('quiz-count').value;
            let limit = countVal === 'all' ? filtered.length : Math.min(parseInt(countVal), filtered.length);
            
            quizQueue = filtered.slice(0, limit);
            currentIndex = 0;

            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'inline-block';
            
            showCard();
        }

        function showCard() {
            const item
