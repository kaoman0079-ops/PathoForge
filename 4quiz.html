<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathoForge クイズ</title>
    <style>
        :root { --primary: #3498db; --bg: #f4f7f6; --card: #ffffff; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 20px; }
        .chapter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-check { padding: 12px; border: 2px solid var(--primary); border-radius: 12px; background: white; cursor: pointer; font-weight: bold; }
        .btn-check.active { background: var(--primary); color: white; }
        input[type="number"] { width: 100%; padding: 10px; box-sizing: border-box; border: 2px solid #ddd; border-radius: 10px; margin: 10px 0; }
        .start-btn { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        #quiz-area { display: none; }
    </style>
</head>
<body>

<div class="container" id="setup-area">
    <h1>演習設定</h1>
    <div class="chapter-grid" id="chapter-buttons">
        <button class="btn-check" data-ch="8" onclick="toggle(this)">8章</button>
        <button class="btn-check" data-ch="9" onclick="toggle(this)">9章</button>
        <button class="btn-check" data-ch="10" onclick="toggle(this)">10章</button>
    </div>
    <label>出題数:</label>
    <input type="number" id="num-q" value="5">
    <button class="start-btn" onclick="startQuiz()">開始する</button>
</div>

<div class="container" id="quiz-area">
    <div id="question"></div>
</div>

<script>
    let allData = [];
    let selected = new Set();

    // CSV取得
    fetch('data2.csv').then(r => r.text()).then(text => {
        allData = text.split('\n').slice(1).map(line => {
            const p = line.split(',');
            return { ch: parseInt(p[1]), q: p[2], ans: p[7], exp: p[8] };
        });
    });

    function toggle(btn) {
        const ch = parseInt(btn.dataset.ch);
        if (selected.has(ch)) { selected.delete(ch); btn.classList.remove('active'); }
        else { selected.add(ch); btn.classList.add('active'); }
    }

    function startQuiz() {
        if(selected.size === 0) return alert("章を選んでください");
        const filtered = allData.filter(d => selected.has(d.ch));
        const count = document.getElementById('num-q').value;
        
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('question').innerHTML = `<h3>残り ${count} 問</h3><p>テスト開始！</p>`;
        // ここに以前のクイズ表示ロジックを接続します
    }
</script>
</body>
</html>
