<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PathoForge 4択クイズ</title>
    <style>
        :root { --main-bg: #F4F6F9; --card-bg: #FFFFFF; --primary: #3498db; --primary-light: #ebf5fb; --text-main: #2C3E50; --text-dim: #7F8C8D; --border-color: #E1E8ED; --success: #2ecc71; --error: #e74c3c; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--main-bg); margin: 0; padding: 20px; color: var(--text-main); }
        .container { max-width: 600px; margin: 0 auto; }
        .nav-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-btn { display: inline-flex; align-items: center; gap: 5px; background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-decoration: none; }
        h1 { font-size: 1.8rem; font-weight: 800; text-align: center; margin-bottom: 25px; }
        .section-title { font-size: 0.9rem; font-weight: bold; color: var(--text-dim); margin: 20px 0 8px 5px; }
        .chapter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-check { padding: 14px; border: 2px solid var(--border-color); border-radius: 14px; background: white; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .btn-check.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
        .btn-all { grid-column: span 3; }
        select { width: 100%; padding: 14px; border: 2px solid var(--border-color); border-radius: 14px; background: white; font-size: 1rem; font-weight: bold; }
        .start-btn { width: 100%; padding: 16px; background: #27ae60; color: white; border: none; border-radius: 14px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 30px; }
        #quiz-area { display: none; }
        .quiz-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 30px 25px; min-height: 320px; }
        .question-body { font-size: 1.1rem; font-weight: 600; line-height: 1.9; margin-bottom: 25px; }
        .choices-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .choice-btn { width: 100%; padding: 16px 20px; background: white; border: 2px solid var(--border-color); border-radius: 14px; text-align: left; cursor: pointer; }
        .choice-btn.correct { background-color: var(--success) !important; border-color: var(--success) !important; color: white !important; }
        .choice-btn.incorrect { background-color: var(--error) !important; border-color: var(--error) !important; color: white !important; }
        .choice-btn.disabled { pointer-events: none; opacity: 0.6; }
        #commentary-box { margin-bottom: 25px; padding: 15px; background-color: #F8F9FA; border-left: 4px solid var(--primary); border-radius: 8px; display: none; }
        .btn-next { padding: 14px 28px; border-radius: 14px; font-weight: bold; cursor: pointer; background-color: var(--primary); color: white; border: none; visibility: hidden; }
    </style>
</head>
<body>
<div class="container">
    <div id="setup-area">
        <div class="nav-area"><a href="index.html" class="back-btn">⏎ 病理学ポータル</a></div>
        <h1>4択演習 設定</h1>
        <div class="section-title">出題カテゴリ</div>
        <div class="chapter-grid">
            <button class="btn-check" data-ch="8" onclick="toggleChapter(this)">8章</button>
            <button class="btn-check" data-ch="9" onclick="toggleChapter(this)">9章</button>
            <button class="btn-check" data-ch="10" onclick="toggleChapter(this)">10章</button>
            <button class="btn-check btn-all" onclick="selectAllChapters()">全範囲を選択</button>
        </div>
        <div class="section-title">出題数</div>
        <select id="num-q"><option value="5">5問</option><option value="10">10問</option><option value="20">20問</option><option value="all">全問</option></select>
        <button class="start-btn" onclick="startQuiz()">クイズを開始 🚀</button>
    </div>

    <div id="quiz-area">
        <div class="nav-area"><button class="back-btn" onclick="resetToPortal()">➔ 設定に戻る</button></div>
        <div class="quiz-card">
            <div id="card-progress" style="font-size:0.8rem; color:var(--text-dim);"></div>
            <div class="question-body" id="q-text"></div>
            <div class="choices-container" id="choices-box"></div>
            <div id="commentary-box"></div>
            <button class="btn-next" id="next-action-btn" onclick="goToNext()">次のカード ➔</button>
        </div>
    </div>
</div>

<script>
    let allData = [], quizQueue = [], currentIdx = 0, selectedChapters = new Set();

    fetch('data2.csv')
        .then(r => r.text())
        .then(text => {
            allData = text.split('\n').slice(1).filter(line => line.trim()).map(line => {
                const p = line.split(',');
                return { ch: parseInt(p[1]), q: p[2], choices: [p[3], p[4], p[5], p[6]], ans: String(p[7]), comment: p[8] };
            });
        });

    function toggleChapter(btn) {
        const ch = parseInt(btn.dataset.ch);
        selectedChapters.has(ch) ? selectedChapters.delete(ch) : selectedChapters.add(ch);
        btn.classList.toggle('active');
    }

    function selectAllChapters() {
        document.querySelectorAll('.btn-check:not(.btn-all)').forEach(b => {
            selectedChapters.add(parseInt(b.dataset.ch));
            b.classList.add('active');
        });
    }

    function startQuiz() {
        if (selectedChapters.size === 0) return alert("章を選択してください。");
        let filtered = allData.filter(d => selectedChapters.has(d.ch)).sort(() => Math.random() - 0.5);
        const count = document.getElementById('num-q').value;
        quizQueue = filtered.slice(0, count === 'all' ? filtered.length : parseInt(count));
        currentIdx = 0;
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQ();
    }

    function showQ() {
        const q = quizQueue[currentIdx];
        document.getElementById('card-progress').innerText = `カード ${currentIdx + 1} / ${quizQueue.length}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('commentary-box').style.display = 'none';
        const box = document.getElementById('choices-box'); box.innerHTML = '';
        q.choices.forEach((c, i) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn'; btn.innerText = c;
            btn.onclick = () => {
                document.querySelectorAll('.choice-btn').forEach((b, idx) => {
                    b.classList.add('disabled');
                    if (q.ans.includes(String(idx + 1))) b.classList.add('correct');
                });
                if (!q.ans.includes(String(i + 1))) btn.classList.add('incorrect');
                if (q.comment) {
                    const cb = document.getElementById('commentary-box');
                    cb.innerHTML = `<strong>💡 解説:</strong><br>${q.comment}`;
                    cb.style.display = 'block';
                }
                document.getElementById('next-action-btn').style.visibility = 'visible';
            };
            box.appendChild(btn);
        });
        document.getElementById('next-action-btn').style.visibility = 'hidden';
    }

    function goToNext() {
        if (++currentIdx < quizQueue.length) showQ();
        else resetToPortal();
    }

    function resetToPortal() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('setup-area').style.display = 'block';
        currentIdx = 0;
    }
</script>
</body>
</html>
