<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PathoForge クイズ</title>
    <style>
        :root { --primary: #3498db; --bg: #f4f7f6; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .chapter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-check { padding: 12px; border: 2px solid var(--primary); border-radius: 12px; background: white; cursor: pointer; font-weight: bold; }
        .btn-check.active { background: var(--primary); color: white; }
        .start-btn { width: 100%; padding: 15px; background: #2ecc71; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #quiz-area { display: none; margin-top: 20px; }
        .choice-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; text-align: left; }
    </style>
</head>
<body>

<div class="container" id="setup-area">
    <h1>演習設定</h1>
    <div class="chapter-grid">
        <button class="btn-check" data-ch="8" onclick="toggle(this)">8章</button>
        <button class="btn-check" data-ch="9" onclick="toggle(this)">9章</button>
        <button class="btn-check" data-ch="10" onclick="toggle(this)">10章</button>
    </div>
    <label>出題数:</label>
    <input type="number" id="num-q" value="5" style="width:100%; padding:10px; margin:10px 0; border-radius:8px; border:1px solid #ddd;">
    <button class="start-btn" onclick="startQuiz()">クイズを開始</button>
</div>

<div class="container" id="quiz-area">
    <div id="q-text" style="font-weight:bold; margin-bottom:15px;"></div>
    <div id="choices-area"></div>
</div>

<script>
    let allData = [], quizQueue = [], currentIdx = 0, selected = new Set();

    // CSV読み込み
    fetch('data2.csv')
        .then(r => r.text())
        .then(text => {
            allData = text.split('\n').slice(1).filter(l => l.trim()).map(line => {
                const p = line.split(',');
                return { ch: parseInt(p[1]), q: p[2], c: [p[3], p[4], p[5], p[6]], ans: p[7], exp: p[8] };
            });
        })
        .catch(e => alert("CSVの読み込みに失敗しました。ファイル名を確認してください。"));

    function toggle(btn) {
        const ch = parseInt(btn.dataset.ch);
        selected.has(ch) ? selected.delete(ch) : selected.add(ch);
        btn.classList.toggle('active');
    }

    function startQuiz() {
        if(selected.size === 0) return alert("章を選んでください");
        const filtered = allData.filter(d => selected.has(d.ch));
        if(filtered.length === 0) return alert("選択した章に問題がありません");
        
        const count = parseInt(document.getElementById('num-q').value);
        quizQueue = filtered.sort(() => Math.random() - 0.5).slice(0, count);
        
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        showQ();
    }

    function showQ() {
        const q = quizQueue[currentIdx];
        document.getElementById('q-text').innerText = (currentIdx + 1) + ". " + q.q;
        const area = document.getElementById('choices-area');
        area.innerHTML = '';
        q.c.forEach((choice, i) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice;
            btn.onclick = () => {
                alert(parseInt(q.ans) === i + 1 ? "正解！" : "残念！正解は" + q.ans);
                currentIdx++;
                if(currentIdx < quizQueue.length) showQ();
                else alert("終了！");
            };
            area.appendChild(btn);
        });
    }
</script>
</body>
</html>
