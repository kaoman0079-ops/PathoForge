<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>病理学 4択クイズ</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .option-btn { width: 100%; padding: 15px; margin-bottom: 10px; display: block; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 10px; }
        .correct { background-color: #d4edda; border-color: #28a745; }
        .wrong { background-color: #f8d7da; border-color: #dc3545; }
    </style>
</head>
<body>
    <div class="container" id="quiz-container">
        <h2>4択クイズ</h2>
        <div id="question-area">問題読み込み中...</div>
        <div id="options-area"></div>
        <div id="result-area"></div>
        <button id="next-btn" style="display:none;" onclick="showNext()">次の問題へ</button>
    </div>

    <script>
        let quizData = [];
        let currentIndex = 0;

        // data2.csv を読み込む処理
        fetch('./data2.csv')
            .then(res => res.text())
            .then(text => {
                const lines = text.split('\n');
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split(',');
                    if (row.length < 8) continue;
                    quizData.push({
                        q: row[2],
                        ans: parseInt(row[3]),
                        opts: [row[4], row[5], row[6], row[7]]
                    });
                }
                showQuestion();
            });

        function showQuestion() {
            const data = quizData[currentIndex];
            document.getElementById('question-area').innerText = data.q;
            const area = document.getElementById('options-area');
            area.innerHTML = '';
            data.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = (i + 1) + '. ' + opt;
                btn.onclick = () => checkAnswer(i + 1, btn);
                area.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const correct = quizData[currentIndex].ans;
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => b.disabled = true);
            
            if (selected === correct) {
                btn.classList.add('correct');
                document.getElementById('result-area').innerText = "正解！";
            } else {
                btn.classList.add('wrong');
                btns[correct - 1].classList.add('correct');
                document.getElementById('result-area').innerText = "不正解（正解は " + correct + "）";
            }
            document.getElementById('next-btn').style.display = 'block';
        }

        function showNext() {
            currentIndex++;
            if (currentIndex < quizData.length) {
                document.getElementById('result-area').innerText = '';
                document.getElementById('next-btn').style.display = 'none';
                showQuestion();
            } else {
                document.getElementById('quiz-container').innerHTML = "<h2>終了！</h2>";
            }
        }
    </script>
</body>
</html>
