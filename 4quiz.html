<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病理学 4択クイズ</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; text-align: center; color: #2c3e50; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .back-btn { background: #fff; border: 1px solid #ccd1d9; padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; display: inline-block; margin-bottom: 20px; color: #555; text-decoration: none; }
        .back-btn:hover { background: #f8f9fa; }
        h2 { color: #2c3e50; font-size: 1.8rem; margin-bottom: 20px; font-weight: bold; }
        .status-box { background: #f8f9fa; border: 1px solid #ccd1d9; padding: 12px; border-radius: 12px; margin-bottom: 25px; font-size: 0.9rem; text-align: left; line-height: 1.4; }
        .setting-item { margin-bottom: 25px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #2c3e50; font-size: 0.95rem; }
        select { width: 100%; padding: 14px; font-size: 1rem; border-radius: 12px; border: 1px solid #ccd1d9; background-color: #fff; font-weight: 600; color: #2c3e50; outline: none; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .toggle-btn { flex: 1; padding: 12px; border: 1px solid #ccd1d9; background: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; transition: all 0.15s; color: #2c3e50; text-align: center; }
        .toggle-btn.active { background: #e8f4fd; color: #3498db; border-color: #3498db; }
        .all-btn { width: 100%; padding: 12px; border: 1px solid #ccd1d9; background: #f8f9fa; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 15px; color: #555; }
        .start-btn { width: 100%; padding: 16px; background-color: #2ecc71; color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2); }
        .start-btn:hover { background-color: #27ae60; }
        .quiz-view { display: none; }
        .quiz-card { background: #fff; border: 1px solid #ccd1d9; border-radius: 24px; padding: 30px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; color: #95a5a6; font-weight: bold; margin-bottom: 25px; border-bottom: 1px solid #f1f2f6; padding-bottom: 15px; }
        .card-body { font-size: 1.2rem; font-weight: bold; line-height: 1.8; color: #2c3e50; margin-bottom: 25px; word-break: break-word; }
        .option-btn { width: 100%; padding: 15px; margin-bottom: 12px; text-align: left; background: #fff; border: 2px solid #e6e9ed; border-radius: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.1s; color: #333; box-sizing: border-box; }
        .option-btn:hover { background: #f8f9fa; border-color: #ccd1d9; }
        .option-btn.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; }
        .option-btn.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }
        .result-msg { font-size: 1.3rem; font-weight: bold; margin-top: 15px; text-align: center; display: none; }
        .next-btn { width: 100%; padding: 16px; background-color: #3498db; color: white; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; display: none; }
        .next-btn:hover { background-color: #2980b9; }
        .result-view { display: none; }
    </style>
</head>
<body>

    <div id="nav-zone">
        <button class="back-btn" id="back-btn" style="display: none; margin-right: 8px;" onclick="backToSetup()">➔ 設定に戻る</button>
        <button class="back-btn" onclick="window.location.href='https://kaoman0079-ops.github.io/Meridian-Node/'">🏠 Meridian-Nodeへ戻る</button>
    </div>

    <div id="setup-view" class="container">
        <h2>4択クイズ 設定</h2>
        <div id="db-status" class="status-box" style="color: #7f8c8d;">⏳ データを準備中...</div>

        <div class="setting-item">
            <label>出題カテゴリ</label>
            <div class="btn-group">
                <button class="toggle-btn ch-btn active" data-ch="8">8章</button>
                <button class="toggle-btn ch-btn" data-ch="9">9章</button>
                <button class="toggle-btn ch-btn" data-ch="10">10章</button>
            </div>
            <button class="all-btn" onclick="selectAllChapters()">全範囲を選択</button>
        </div>

        <div class="setting-item">
            <label>出題順</label>
            <div class="btn-group">
                <button class="toggle-btn order-btn active" data-order="sequence">順番通り</button>
                <button class="toggle-btn order-btn" data-order="random">ランダム</button>
            </div>
        </div>

        <div class="setting-item">
            <label>出題数</label>
            <select id="quiz-count">
                <option value="5">5問</option>
                <option value="10" selected>10問</option>
                <option value="20">20問</option>
                <option value="all">全問</option>
            </select>
        </div>
        <button class="start-btn" onclick="startQuiz()">クイズを開始する 🚀</button>
    </div>

    <div id="quiz-view" class="container quiz-view">
        <div class="quiz-card">
            <div class="card-header"><span id="card-count">第 1 問</span><span id="card-meta">病理学</span></div>
            <div class="card-body" id="question-text">問題文読み込み中...</div>
            <div id="options-area"></div>
        </div>
        <div id="result-message" class="result-msg"></div>
        <button class="next-btn" id="next-btn" onclick="nextCard()">次の問題へ ➔</button>
    </div>

    <div id="result-view" class="container result-view">
        <h2>クイズ終了！</h2>
        <p id="score-text" style="font-size: 1.3rem; font-weight: bold; margin-bottom: 30px;"></p>
        <button class="start-btn" onclick="backToSetup()">設定に戻る 🔄</button>
    </div>

    <script>
        let database = [];
        let quizQueue = [];
        let currentIndex = 0;
        let score = 0;

        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.ch-btn').forEach(btn => btn.addEventListener('click', () => btn.classList.toggle('active')));
            document.querySelectorAll('.order-btn').forEach(btn => btn.addEventListener('click', (e) => {
                document.querySelectorAll('.order-btn').forEach(b => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
            }));
            fetch('./data2.csv') // 修正: data2.csvを指定
                .then(r => r.text()).then(parseCSV);
        });

        function parseCSV(text) {
            database = text.split(/\r?\n/).slice(1).filter(line => line.trim()).map(line => {
                const p = line.split(',');
                return { chapter: p[0].trim(), no: p[1].trim(), question: p[2].trim(), ans: parseInt(p[3]), options: [p[4].trim(), p[5].trim(), p[6].trim(), p[7].trim()] };
            });
            document.getElementById('db-status').innerHTML = `✅ <strong>${database.length}件</strong> のデータ読み込み完了！`;
        }

        function startQuiz() {
            const active = Array.from(document.querySelectorAll('.ch-btn.active')).map(b => b.dataset.ch);
            let filtered = database.filter(item => active.includes(item.chapter));
            if (document.querySelector('.order-btn.active').dataset.order === 'random') filtered.sort(() => Math.random() - 0.5);
            
            const limit = document.getElementById('quiz-count').value;
            quizQueue = filtered.slice(0, limit === 'all' ? filtered.length : parseInt(limit));
            currentIndex = 0; score = 0;
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'inline-block';
            showCard();
        }

        function showCard() {
            const item = quizQueue[currentIndex];
            document.getElementById('card-count').innerText = `第 ${currentIndex + 1} 問 / ${quizQueue.length}`;
            document.getElementById('question-text').innerText = item.question;
            const area = document.getElementById('options-area'); area.innerHTML = '';
            item.options.forEach((o, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${i+1}. ${o}`;
                btn.onclick = () => {
                    if(document.getElementById('next-btn').style.display === 'block') return;
                    if (i + 1 === item.ans) { score++; document.getElementById('result-message').innerHTML = "⭕ 正解！"; document.getElementById('result-message').style.color = "#28a745"; }
                    else { document.getElementById('result-message').innerHTML = `❌ 不正解 (正解: ${item.ans})`; document.getElementById('result-message').style.color = "#dc3545"; }
                    document.getElementById('result-message').style.display = 'block';
                    document.getElementById('next-btn').style.display = 'block';
                };
                area.appendChild(btn);
            });
        }

        function nextCard() {
            currentIndex++;
            if (currentIndex < quizQueue.length) showCard();
            else {
                document.getElementById('quiz-view').style.display = 'none';
                document.getElementById('result-view').style.display = 'block';
                document.getElementById('score-text').innerText = `${quizQueue.length}問中 ${score}問 正解！`;
            }
        }

        function backToSetup() {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('setup-view').style.display = 'block';
        }
        function selectAllChapters() { document.querySelectorAll('.ch-btn').forEach(btn => btn.classList.add('active')); }
    </script>
</body>
</html>
